# Read more about this feature here: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom
#
# Configure dependency scanning with spec:inputs (https://docs.gitlab.com/ci/yaml/#specinputs).
# List of available options: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
spec:
  inputs:
    # Settings for DS job behavior.
    job_name:
      type: string
      default: 'dependency-scanning'
      description: "The name of the dependency scanning job."
    stage:
      type: string
      default: test
      description: "The stage of the dependency scanning job."
    allow_failure:
      type: boolean
      default: true
      description: "When true, a failed dependency scanning job does not fail the pipeline. When false, a failure blocks the pipeline."
    # Default value set to SECURE_ANALYZERS_PREFIX to ensure that global variables applying to AST templates
    # work as expected. If $SECURE_ANALYZERS_PREFIX is set globally and this input is supplied, the global
    # variable will be preferred.
    analyzer_image_prefix:
      type: string
      default: "$SECURE_ANALYZERS_PREFIX"
      description: "The registry url prefix pointing to the repository of the analyzer."
    analyzer_image_name:
      type: string
      default: "dependency-scanning"
      description: "The repository of the analyzer image used by the dependency-scanning job."
    analyzer_image_version:
      type: string
      default: "1"
      description: "The version of the analyzer image used by the dependency-scanning job."

    # Settings for DS analyzer behavior.
    additional_ca_cert_bundle:
      type: string
      default: ""
      description: "CA certificate bundle to trust. The CA bundle provided here is added to the system's certificates and also used by other tools during the scanning process."
    pipcompile_requirements_file_name_pattern:
      type: string
      default: ""
      description: "Custom requirements file name pattern to use when analyzing. The pattern should match file names only, not directory paths. See https://github.com/bmatcuk/doublestar/tree/v1#patterns for syntax details."
    max_scan_depth:
      type: number
      default: 2
      description: "Defines how many directory levels analyzer should search for supported files. A value of -1 means the analyzer will search all directories regardless of depth."
    excluded_paths:
      type: string
      default: "**/spec,**/test,**/tests,**/tmp,**/node_modules,**/.bundle,**/vendor,**/.git"
      description: "A comma-separated list of paths (globs supported) to exclude from the scan."
    include_dev_dependencies:
      type: boolean
      default: true
      description: "Include development/test dependencies when scanning a supported file."
    enable_static_reachability:
      type: boolean
      default: false
      description: "Enable static reachability."
    analyzer_log_level:
      type: string
      default: "info"
      description: "Logging level used by the analyzer. The options are fatal, error, warn, info, debug."
    enable_vulnerability_scan:
      type: boolean
      default: true
      description: "Enable the vulnerability analysis of generated SBOMs."
    vulnerability_scan_api_timeout:
      type: number
      default: 10
      description: "Vulnerability scanning API request timeout in seconds."
    vulnerability_scan_api_download_delay:
      type: number
      default: 3
      description: "Vulnerability scanning API initial delay in seconds before downloading scan results."

    # Settings for all dependency resolution jobs.
    resolution_jobs_stage:
      type: string
      default: .pre
      description: "The stage for the dependency resolution jobs."
    resolution_jobs_allow_failure:
      type: boolean
      default: true
      description: "When true, a failed resolution job does not fail the pipeline. When false, a resolution failure blocks the pipeline."
    disabled_resolution_jobs:
      type: string
      default: ""
      description: "Comma-separated list of resolution jobs to disable (e.g., 'maven, python'). By default, all available resolution jobs are enabled. Possible values are: maven,gradle,python."

    # Settings for maven resolution job.
    maven_resolution_job_name:
      type: string
      default: "dependency-scanning:maven-resolution"
      description: "The name of the job for maven dependency resolution."
    maven_resolution_image:
      type: string
      default: "registry.gitlab.com/security-products/dependency-resolution/ubi9/openjdk-21:1"
      description: "The image used by the maven dependency resolution job."

    # Settings for python resolution job.
    python_resolution_job_name:
      type: string
      default: "dependency-scanning:python-resolution"
      description: "The name of the job for python dependency resolution."
    python_resolution_image:
      type: string
      default: "registry.gitlab.com/security-products/dependency-resolution/ubi9/python-312-minimal-with-piptools-7:9"
      description: "The image used by the python dependency resolution job."

---

variables:
  # Setting this variable affects all Security templates
  # (SAST, Dependency Scanning, ...)
  SECURE_ANALYZERS_PREFIX: "$CI_TEMPLATE_REGISTRY_HOST/security-products"
  # Variable used to track the template/component introducing DS analyzer. Please do not override.
  # This is an internal variable.
  INTERNAL_DS_ANALYZER_CI_INTEGRATION: "template::v2"
  # Temporary override for feature rollout. This will be removed when releasing the feature.
  DS_DISABLED_RESOLUTION_JOBS: "maven, python, gradle"

# ----------------------------------------------------------------
# Main Dependency Scanning job
# This job is mandatory and responsible for doing the complete dependency analysis

"$[[ inputs.job_name ]]":
  variables:
    DS_ANALYZER_IMAGE: $[[ inputs.analyzer_image_prefix ]]/$[[ inputs.analyzer_image_name ]]:$[[ inputs.analyzer_image_version ]]
  image: "$DS_ANALYZER_IMAGE"
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  script:
    - echo "Using Dependency-Scanning.v2.gitlab-ci.yml"
    # Variable fallback for legacy variables used by version 1 of the Dependency Scanning template.
    - export ADDITIONAL_CA_CERT_BUNDLE="${ADDITIONAL_CA_CERT_BUNDLE:-$[[ inputs.additional_ca_cert_bundle ]]}"
    - export DS_PIPCOMPILE_REQUIREMENTS_FILE_NAME_PATTERN="${DS_PIPCOMPILE_REQUIREMENTS_FILE_NAME_PATTERN:-$[[ inputs.pipcompile_requirements_file_name_pattern ]]}"
    - export DS_MAX_DEPTH="${DS_MAX_DEPTH:-$[[ inputs.max_scan_depth ]]}"
    - export DS_EXCLUDED_PATHS="${DS_EXCLUDED_PATHS:-$[[ inputs.excluded_paths ]]}"
    - export DS_INCLUDE_DEV_DEPENDENCIES="${DS_INCLUDE_DEV_DEPENDENCIES:-$[[ inputs.include_dev_dependencies ]]}"
    - export DS_STATIC_REACHABILITY_ENABLED="${DS_STATIC_REACHABILITY_ENABLED:-$[[ inputs.enable_static_reachability ]]}"
    - export SECURE_LOG_LEVEL="${SECURE_LOG_LEVEL:-$[[ inputs.analyzer_log_level ]]}"
    - export DS_ENABLE_VULNERABILITY_SCAN="${DS_ENABLE_VULNERABILITY_SCAN:-$[[ inputs.enable_vulnerability_scan ]]}"
    - export DS_API_TIMEOUT="${DS_API_TIMEOUT:-$[[ inputs.vulnerability_scan_api_timeout ]]}"
    - export DS_API_SCAN_DOWNLOAD_DELAY="${DS_API_SCAN_DOWNLOAD_DELAY:-$[[ inputs.vulnerability_scan_api_download_delay ]]}"
    - /analyzer run
  artifacts:
    access: "developer"
    paths:
      - "**/gl-sbom-*.cdx.json"
      - "gl-dependency-scanning-report.json"
    reports:
      cyclonedx: "**/gl-sbom-*.cdx.json"
      dependency_scanning: 'gl-dependency-scanning-report.json'
  rules:
      # The following 3 blocks of rules define whether the job runs in a an *MR pipeline* or a *branch pipeline*
    # when an MR exists. If the job has additional rules to observe they should be added in the blocks 1 and 3
    # to cover both the *MR pipeline* and the *branch pipeline* workflows.

    # 1. Run the job in an *MR pipeline* if MR pipelines for AST are enabled and there's an open merge request.
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_PIPELINE_SOURCE == "merge_request_event"'

    # 2. Don't run the job in a *branch pipeline* if *MR pipelines* for AST are enabled and there's an open merge request.
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_OPEN_MERGE_REQUESTS'
      when: never

    # 3. Finally, run the job in a *branch pipeline* (When MR pipelines are disabled for AST, or it is enabled but no open MRs exist for the branch).
    - if: $CI_COMMIT_BRANCH

# ----------------------------------------------------------------
# Dependency Resolution jobs
# These jobs resolve a dependency graph for projects without a lockfile.

# ----------------------------------------------------------------
# Dependency Resolution for Maven
"$[[ inputs.maven_resolution_job_name ]]":
  variables:
    DS_ANALYZER_IMAGE: $[[ inputs.analyzer_image_prefix ]]/$[[ inputs.analyzer_image_name ]]:$[[ inputs.analyzer_image_version ]]
    DS_MAVEN_RESOLUTION_IMAGE: $[[ inputs.maven_resolution_image ]]
    # List of variables exported to the service container (DS analyzer image) that are useful for dependency file detection and dependency resolution commands generation
    DS_MAVEN_RESOLUTION_EXPORTED_VARS: ADDITIONAL_CA_CERT_BUNDLE DS_MAX_DEPTH DS_EXCLUDED_PATHS DS_INCLUDE_DEV_DEPENDENCIES SECURE_LOG_LEVEL
  image: $DS_MAVEN_RESOLUTION_IMAGE
  stage: $[[ inputs.resolution_jobs_stage ]]
  allow_failure: $[[ inputs.resolution_jobs_allow_failure ]]
  services:
    - name: $DS_ANALYZER_IMAGE
      alias: ds-analyzer
      command: ["/analyzer", "dependency-resolution-service", "--project-types", "maven"]
  script:
    # Variable fallback for legacy variables used by version 1 of the Dependency Scanning template.
    # These export statements only affect the main container, update DS_MAVEN_RESOLUTION_EXPORTED_VARS to expose them to the service container if necessary.
    - export ADDITIONAL_CA_CERT_BUNDLE="${ADDITIONAL_CA_CERT_BUNDLE:-$[[ inputs.additional_ca_cert_bundle ]]}"
    - export DS_MAX_DEPTH="${DS_MAX_DEPTH:-$[[ inputs.max_scan_depth ]]}"
    - export DS_EXCLUDED_PATHS="${DS_EXCLUDED_PATHS:-$[[ inputs.excluded_paths ]]}"
    - export DS_INCLUDE_DEV_DEPENDENCIES="${DS_INCLUDE_DEV_DEPENDENCIES:-$[[ inputs.include_dev_dependencies ]]}"
    - export SECURE_LOG_LEVEL="${SECURE_LOG_LEVEL:-$[[ inputs.analyzer_log_level ]]}"

    # Create the shared directory to communicate with service container.
    # World-write needed as main container and service container may run as different UIDs
    - mkdir -p .gitlab_ds && chmod 777 .gitlab_ds
    - touch .gitlab_ds/env && chmod 666 .gitlab_ds/env
    # Explicitly expose relevant variables to the service container via an env file
    - for var in $DS_MAVEN_RESOLUTION_EXPORTED_VARS; do printf '%s=%s\n' "$var" "$(printenv "$var")"; done > .gitlab_ds/env
    # Signal readiness for service to start
    - touch ".gitlab_ds/ready_${CI_JOB_ID}" && chmod 666 ".gitlab_ds/ready_${CI_JOB_ID}"

    # Wait for dependency_resolution.sh to be generated by the service container
    - |
      TIMEOUT=60
      ELAPSED=0
      while [ ! -f .gitlab_ds/dependency_resolution.sh ] && [ $ELAPSED -lt $TIMEOUT ]; do
        sleep 1
        ELAPSED=$((ELAPSED + 1))
      done

      # Display service container logs in main job logs
      cat .gitlab_ds/service.log || echo "WARNING: no service logs found"

      if [ ! -f .gitlab_ds/dependency_resolution.sh ]; then
        echo "ERROR: .gitlab_ds/dependency_resolution.sh script not found after $TIMEOUT seconds"
        exit 1
      fi
    - sh .gitlab_ds/dependency_resolution.sh

  artifacts:
    paths:
      - '**/maven.graph.json'
    when: always
  rules:
    - if: '"$[[ inputs.disabled_resolution_jobs ]]" =~ /\bmaven\b/ || $DS_DISABLED_RESOLUTION_JOBS =~ /\bmaven\b/'
      when: never

    # The following 3 blocks of rules define whether the job runs in a an *MR pipeline* or a *branch pipeline*
    # when an MR exists. If the job has additional rules to observe they should be added in the blocks 1 and 3
    # to cover both the *MR pipeline* and the *branch pipeline* workflows.

    # 1. Run the job in an *MR pipeline* if MR pipelines for AST are enabled and there's an open merge request.
    # With default file detection
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - '**/pom.xml'
    # 2. Don't run the job in a *branch pipeline* if *MR pipelines* for AST are enabled and there's an open merge request.
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_OPEN_MERGE_REQUESTS'
      when: never
    # 3. Finally, run the job in a *branch pipeline* (When MR pipelines are disabled for AST, or it is enabled but no open MRs exist for the branch).
    # With default file detection
    - if: $CI_COMMIT_BRANCH
      exists:
        - '**/pom.xml'

# ----------------------------------------------------------------
# Dependency Resolution for Python
"$[[ inputs.python_resolution_job_name ]]":
  variables:
    DS_ANALYZER_IMAGE: $[[ inputs.analyzer_image_prefix ]]/$[[ inputs.analyzer_image_name ]]:$[[ inputs.analyzer_image_version ]]
    DS_PYTHON_RESOLUTION_IMAGE: $[[ inputs.python_resolution_image ]]
    # List of variables exported to the service container (DS analyzer image) that are useful for dependency file detection and dependency resolution commands generation
    DS_PYTHON_RESOLUTION_EXPORTED_VARS: ADDITIONAL_CA_CERT_BUNDLE DS_PIPCOMPILE_REQUIREMENTS_FILE_NAME_PATTERN PIP_REQUIREMENTS_FILE DS_PIP_DEPENDENCY_PATH DS_MAX_DEPTH DS_EXCLUDED_PATHS DS_INCLUDE_DEV_DEPENDENCIES SECURE_LOG_LEVEL
  image: $DS_PYTHON_RESOLUTION_IMAGE
  stage: $[[ inputs.resolution_jobs_stage ]]
  allow_failure: $[[ inputs.resolution_jobs_allow_failure ]]
  services:
    - name: $DS_ANALYZER_IMAGE
      alias: ds-analyzer
      command: ["/analyzer", "dependency-resolution-service", "--project-types", "python"]
  script:
    # Variable fallback for legacy variables used by version 1 of the Dependency Scanning template.
    # These export statements only affect the main container, update DS_PYTHON_RESOLUTION_EXPORTED_VARS to expose them to the service container if necessary.
    - export ADDITIONAL_CA_CERT_BUNDLE="${ADDITIONAL_CA_CERT_BUNDLE:-$[[ inputs.additional_ca_cert_bundle ]]}"
    - export DS_PIPCOMPILE_REQUIREMENTS_FILE_NAME_PATTERN="${DS_PIPCOMPILE_REQUIREMENTS_FILE_NAME_PATTERN:-$[[ inputs.pipcompile_requirements_file_name_pattern ]]}"
    - export DS_MAX_DEPTH="${DS_MAX_DEPTH:-$[[ inputs.max_scan_depth ]]}"
    - export DS_EXCLUDED_PATHS="${DS_EXCLUDED_PATHS:-$[[ inputs.excluded_paths ]]}"
    - export DS_INCLUDE_DEV_DEPENDENCIES="${DS_INCLUDE_DEV_DEPENDENCIES:-$[[ inputs.include_dev_dependencies ]]}"
    - export SECURE_LOG_LEVEL="${SECURE_LOG_LEVEL:-$[[ inputs.analyzer_log_level ]]}"

    # Create the shared directory to communicate with service container.
    # World-write needed as main container and service container may run as different UIDs
    - mkdir -p .gitlab_ds && chmod 777 .gitlab_ds
    - touch .gitlab_ds/env && chmod 666 .gitlab_ds/env
    # Explicitly expose relevant variables to the service container via an env file
    - for var in $DS_PYTHON_RESOLUTION_EXPORTED_VARS; do printf '%s=%s\n' "$var" "$(printenv "$var")"; done > .gitlab_ds/env
    # Signal readiness for service to start
    - touch ".gitlab_ds/ready_${CI_JOB_ID}" && chmod 666 ".gitlab_ds/ready_${CI_JOB_ID}"

    # Wait for dependency_resolution.sh to be generated by the service container
    - |
      TIMEOUT=60
      ELAPSED=0
      while [ ! -f .gitlab_ds/dependency_resolution.sh ] && [ $ELAPSED -lt $TIMEOUT ]; do
        sleep 1
        ELAPSED=$((ELAPSED + 1))
      done

      # Display service container logs in main job logs
      cat .gitlab_ds/service.log || echo "WARNING: no service logs found"

      if [ ! -f .gitlab_ds/dependency_resolution.sh ]; then
        echo "ERROR: .gitlab_ds/dependency_resolution.sh script not found after $TIMEOUT seconds"
        exit 1
      fi
    - sh .gitlab_ds/dependency_resolution.sh

  artifacts:
    paths:
      - '**/pipcompile.lock.txt'
    when: always
  rules:
    - if: '"$[[ inputs.disabled_resolution_jobs ]]" =~ /\bpython\b/ || $DS_DISABLED_RESOLUTION_JOBS =~ /\bpython\b/'
      when: never

    # The following 3 blocks of rules define whether the job runs in a an *MR pipeline* or a *branch pipeline*
    # when an MR exists. If the job has additional rules to observe they should be added in the blocks 1 and 3
    # to cover both the *MR pipeline* and the *branch pipeline* workflows.

    # 1. Run the job in an *MR pipeline* if MR pipelines for AST are enabled and there's an open merge request.
    # With default file detection
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - '**/{requirements.txt,requirements.in,requirements.pip,requires.txt,setup.py,setup.cfg,pyproject.toml}'
    # When $PIP_REQUIREMENTS_FILE is set
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_PIPELINE_SOURCE == "merge_request_event" &&
          $PIP_REQUIREMENTS_FILE'

    # 2. Don't run the job in a *branch pipeline* if *MR pipelines* for AST are enabled and there's an open merge request.
    - if: '($AST_ENABLE_MR_PIPELINES == "true" || $AST_ENABLE_MR_PIPELINES == null) && $CI_OPEN_MERGE_REQUESTS'
      when: never

    # 3. Finally, run the job in a *branch pipeline* (When MR pipelines are disabled for AST, or it is enabled but no open MRs exist for the branch).
    # With default file detection
    - if: $CI_COMMIT_BRANCH
      exists:
        - '**/{requirements.txt,requirements.in,requirements.pip,requires.txt,setup.py,setup.cfg,pyproject.toml}'
    # When $PIP_REQUIREMENTS_FILE is set
    - if: $CI_COMMIT_BRANCH && $PIP_REQUIREMENTS_FILE
