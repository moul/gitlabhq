# Duo Agent Platform flow execution configuration
# See: https://docs.gitlab.com/user/duo_agent_platform/flows/execution/

image: registry.gitlab.com/gitlab-org/gitlab-development-kit/gitlab-gdk-in-a-box:latest

setup_script:
  # Run the agent from GDK's pre-configured gitlab dir, which has a running DB,
  # Gitaly, workhorse, and node_modules already in place. Overlay CI branch files
  # via git archive (tracked files only), start GDK services, then cd into the
  # gitlab dir so duo-cli runs from there.
  - |
    set -e
    unset GIT_CONFIG_GLOBAL
    git config --global --add safe.directory '*'

    GDK_ROOT=/gitlab-gdk/gitlab-development-kit
    GDK_GITLAB=$GDK_ROOT/gitlab

    # Reset GDK's gitlab to remote HEAD so agent commits push cleanly.
    # Fetch master so pre-push hooks can compute the diff base.
    # (The image's default remote points to gitlab-community/gitlab-org/gitlab.)
    cd "$GDK_GITLAB"
    git remote set-url origin "${DUO_WORKFLOW_GIT_HTTP_BASE_URL}/gitlab-org/gitlab.git"
    git config credential.helper "!f() { echo username=oauth; echo password=$GIT_PASSWORD; }; f"
    git fetch --depth=1 origin HEAD master
    git reset --mixed FETCH_HEAD

    # Fetch CI branch ref locally so we can diff against master for deletion cleanup.
    git fetch "$CI_PROJECT_DIR" HEAD:refs/ci-head

    # Overlay CI branch files onto GDK's gitlab dir (node_modules/configs untouched).
    git --git-dir="$CI_PROJECT_DIR/.git" archive HEAD | tar -x -C "$GDK_GITLAB"

    # Remove files deleted on CI branch vs master (git archive doesn't handle deletions).
    git diff --name-only --diff-filter=D origin/master refs/ci-head | \
      while IFS= read -r f; do rm -f "$GDK_GITLAB/$f"; done

    # Add mise shims to PATH before gdk start (GDK's startup scripts require ruby).
    export MISE_IGNORED_CONFIG_PATHS="$GDK_GITLAB/mise.toml"
    export MISE_TRUSTED_CONFIG_PATHS="$GDK_GITLAB"
    export PATH="/home/gdk/.local/share/mise/shims:/home/gdk/.local/bin:$PATH"

    cd "$GDK_ROOT"
    "$GDK_ROOT/bin/gdk" start

    npm install -g @anthropic-ai/sandbox-runtime@0.0.42
    "$GDK_GITLAB/scripts/generate-gitleaks-local-config.sh"
    lefthook install
    cd "$GDK_GITLAB"

network_policy:
  include_recommended_allowed: true
  allowed_domains: []
  denied_domains: []
