#import "ee_else_ce/incidents/graphql/fragments/incident_fields.fragment.graphql"

query getIncidents(
  $projectPath: ID!
  $sort: IssueSort
  $status: IssuableState
  $firstPageSize: Int
  $lastPageSize: Int
  $prevPageCursor: String = ""
  $nextPageCursor: String = ""
  $searchTerm: String = ""
  $authorUsername: String = ""
  $assigneeUsername: String = ""
  $workItemTypeIds: [WorkItemsTypeID!]
) {
  project(fullPath: $projectPath) {
    id
    issues(
      search: $searchTerm
      sort: $sort
      state: $status
      authorUsername: $authorUsername
      assigneeUsername: $assigneeUsername
      first: $firstPageSize
      last: $lastPageSize
      after: $nextPageCursor
      before: $prevPageCursor
      workItemTypeIds: $workItemTypeIds
    ) {
      nodes {
        id
        iid
        title
        createdAt
        state
        labels {
          nodes {
            id
            title
            color
          }
        }
        assignees {
          nodes {
            id
            name
            username
            avatarUrl
            webUrl
          }
        }
        ...IncidentFields
      }
      pageInfo {
        hasNextPage
        endCursor
        hasPreviousPage
        startCursor
      }
    }
  }
}
