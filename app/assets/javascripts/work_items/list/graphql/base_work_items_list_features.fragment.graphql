#import "~/work_items/graphql/milestone.fragment.graphql"

fragment BaseWorkItemsListFeatures on WorkItemFeatures {
  assignees {
    allowsMultipleAssignees
    assignees {
      nodes {
        id
        avatarUrl
        name
        username
        webUrl
        webPath
      }
    }
  }
  awardEmoji {
    upvotes
    downvotes
  }
  milestone {
    milestone {
      ...MilestoneFragment
    }
  }
  startAndDueDate {
    startDate
    dueDate
  }
  timeTracking {
    humanReadableAttributes {
      timeEstimate
    }
  }
  development {
    closingMergeRequests {
      count
    }
  }
  hierarchy {
    parent {
      id
    }
  }
}
