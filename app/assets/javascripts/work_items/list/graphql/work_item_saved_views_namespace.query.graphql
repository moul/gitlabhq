#import "~/graphql_shared/fragments/page_info.fragment.graphql"

# @feature_category: portfolio_management
query savedViews(
  $fullPath: ID!
  $subscribedOnly: Boolean
  $sort: WorkItemsSavedViewsSort
  $search: String
  $first: Int
  $after: String
) {
  namespace(fullPath: $fullPath) {
    id
    savedViews(
      subscribedOnly: $subscribedOnly
      sort: $sort
      search: $search
      first: $first
      after: $after
    ) {
      nodes {
        id
        name
        description
        subscribed
        isPrivate
        userPermissions {
          updateSavedView
          deleteSavedView
          updateSavedViewVisibility
        }
      }
      pageInfo {
        ...PageInfo
      }
    }
  }
}
