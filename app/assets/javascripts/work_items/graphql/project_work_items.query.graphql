# @feature_category: team_planning
query projectWorkItems(
  $searchTerm: String
  $fullPath: ID!
  $types: [IssueType!]
  $in: [IssuableSearchableField!]
  $iid: String = null
  $searchByIid: Boolean = false
  $searchByText: Boolean = true
  $workItemTypeIds: [WorkItemsTypeID!]
) {
  namespace: project(fullPath: $fullPath) {
    id
    workItems(
      search: $searchTerm
      types: $types
      state: opened
      in: $in
      workItemTypeIds: $workItemTypeIds
    ) @include(if: $searchByText) {
      nodes {
        id
        iid
        title
        confidential
        webUrl
        namespace {
          id
          fullPath
        }
        workItemType {
          id
          name
          iconName
        }
      }
    }
    workItemsByIid: workItems(iid: $iid, types: $types, workItemTypeIds: $workItemTypeIds)
      @include(if: $searchByIid) {
      nodes {
        id
        iid
        title
        confidential
        webUrl
        namespace {
          id
          fullPath
        }
        workItemType {
          id
          name
          iconName
        }
      }
    }
  }
}
