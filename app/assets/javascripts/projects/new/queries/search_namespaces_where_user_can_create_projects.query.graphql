query searchNamespacesWhereUserCanCreateProjects($search: String) {
  currentUser {
    id
    groups(permissionScope: CREATE_PROJECTS, search: $search) {
      nodes {
        id
        fullPath
        name
        visibility
        webUrl
        canPushInitialCommit @gl_introduced(version: "18.11.0")
      }
    }
    namespace {
      id
      fullPath
      name
      visibility
      webUrl
      canPushInitialCommit @gl_introduced(version: "18.11.0")
    }
  }
}
