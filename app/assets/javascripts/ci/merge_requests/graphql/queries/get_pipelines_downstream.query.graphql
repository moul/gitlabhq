# @feature_category: continuous_integration
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"
#import "~/ci/pipelines_page/graphql/fragments/pipeline_downstream_item.fragment.graphql"

query getPipelineDownstream($fullPath: ID!, $mergeRequestIid: String!, $ids: [ID!]) {
  project(fullPath: $fullPath) {
    id
    mergeRequest(iid: $mergeRequestIid) {
      id
      pipelines(ids: $ids) {
        nodes {
          id
          downstream(first: 3) {
            nodes {
              ...PipelineDownstreamItem
            }
          }
        }
      }
    }
  }
}
