# @feature_category: continuous_integration
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"
#import "~/ci/pipelines_page/graphql/fragments/pipeline_details.fragment.graphql"

subscription mrPipelineStatusUpdated($pipelineId: CiPipelineID!) {
  ciPipelineStatusUpdated(pipelineId: $pipelineId) {
    ...PipelineDetails
    stages {
      nodes {
        id
        detailedStatus {
          ...CiIcon
          tooltip
          name
        }
      }
    }
    downstream {
      nodes {
        id
        iid
        name
        path
        detailedStatus {
          ...CiIcon
          name
          tooltip
          label
        }
        project {
          id
          fullPath
          name
        }
        sourceJob {
          id
          name
          retried
        }
      }
    }
  }
}
