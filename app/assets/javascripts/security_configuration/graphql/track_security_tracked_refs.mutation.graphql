mutation securityRefsTrack($input: SecurityRefsTrackInput!) {
  securityRefsTrack(input: $input) {
    trackedRefs {
      id
      name
      refType
      isDefault
      isProtected
      commit {
        id
        sha
        shortId
        title
        authoredDate
        webPath
      }
      vulnerabilitiesCount
    }
    errors
  }
}
