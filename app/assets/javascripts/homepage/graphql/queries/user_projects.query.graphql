# @feature_category: navigation
query userProjects(
  $limit: Int!
  $includeFrecent: Boolean!
  $includeStarred: Boolean!
  $includePersonal: Boolean!
  $includeCurrentUser: Boolean!
) {
  frecentProjects @include(if: $includeFrecent) {
    id
    name
    namespace: nameWithNamespace
    avatarUrl
    webPath
  }
  currentUser @include(if: $includeCurrentUser) {
    id
    starredProjects(first: $limit) @include(if: $includeStarred) {
      nodes {
        id
        name
        namespace: nameWithNamespace
        avatarUrl
        webPath
      }
    }
    namespace @include(if: $includePersonal) {
      id
      projects(first: $limit) {
        nodes {
          id
          name
          namespace: nameWithNamespace
          avatarUrl
          webPath
        }
      }
    }
  }
}
