# @feature_category: continuous_integration
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"

subscription mrPipelineUpdated($pipelineId: CiPipelineID!) {
  ciPipelineStatusUpdated(pipelineId: $pipelineId) {
    id
    active
    status
    detailedStatus {
      name
      favicon
      group
      label
      tooltip
      ...CiIcon
    }
    stages {
      nodes {
        id
        status
        detailedStatus {
          name
          favicon
          group
          label
          tooltip
          ...CiIcon
        }
      }
    }
  }
}
