---
features:
  secondary:
  - name: "GitLab Blob Search for group and instance code search"
    available_in: [core, premium, ultimate]
    gitlab_com: true
    self_managed: true
    gitlab_dedicated: true
    gitlab_dedicated_for_government: true
    documentation_link: 'https://docs.gitlab.com/user/duo_agent_platform/agents/tools/#:~:text=REST%20API%20endpoint.-,GitLab%20Blob%20Search,-gitlab_blob_search'
    reporter: frwang1
    stage: ai-powered
    categories:
    - Duo Agent Platform
    issue_url: 'https://gitlab.com/gitlab-org/gitlab/-/work_items/593221'
    description: |
      The [`gitlab_blob_search`](https://docs.gitlab.com/user/duo_agent_platform/agents/tools/#:~:text=REST%20API%20endpoint.-,GitLab%20Blob%20Search,-gitlab_blob_search) tool now enables GitLab AI agents to search your code:

      - Across all projects in a group.
      - Across all accessible projects on an instance.

      Previously, blob search was limited to a single project, or required specifying explicit project IDs. This change makes it easier for AI-powered workflows to discover and reuse code that's spread across multiple related projects.
