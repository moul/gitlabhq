features:
  secondary:
    - name: "Sort users in the GitLab Credits dashboard"
      available_in: [premium, ultimate]
      gitlab_com: true
      self_managed: true
      gitlab_dedicated: true
      gitlab_dedicated_for_government: true
      documentation_link: 'https://docs.gitlab.com/subscriptions/gitlab_credits/#view-the-gitlab-credits-dashboard'
      image_url: '/images/18_10/fulfillment-credits-dashboard-sorting.jpg'
      reporter: brothwell1
      stage: fulfillment
      categories:
        - Consumables Cost Management
      issue_url: 'https://gitlab.com/gitlab-org/customers-gitlab-com/-/work_items/15608'
      description: |
        Enterprise administrators can now sort the **Usage by User** table in the GitLab Credits dashboard by total credits used or by username.

        The default sort order is by total credits consumed (highest first), so the top consumers are immediately visible without scrolling.

        With this view, administrators managing thousands of GitLab Duo users can quickly identify high-usage individuals for cost allocation, chargeback reporting, and license utilization audits.
