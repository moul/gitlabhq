    description: |
      Free tier group Owners on GitLab.com can now unlock AI with GitLab Credits. Purchase a monthly credit amount, commit to an annual term, and get access to [GitLab Duo Agent Platform agents and flows](https://docs.gitlab.com/subscriptions/gitlab_credits/#for-the-free-tier-on-gitlabcom). Credits refresh automatically each month, so your team always has what it needs to build faster and smarter.

      Key highlights:

      - **Usage-based pricing**: Purchase a monthly credit commitment without needing a base plan subscription.
      - **Self-service purchasing**: Buy credits through the GitLab purchase flow.
      - **Seamless upgrade path**: Your credit commitment transfers if you later upgrade to Premium or Ultimate.
      - **Consumption tracking**: Monitor your credit usage through the GitLab Credits dashboard.

      This [purchase option](https://docs.gitlab.com/subscriptions/gitlab_credits/?tab=GitLab.com#buy-gitlab-credits) is currently only available for free GitLab.com top-level groups.
