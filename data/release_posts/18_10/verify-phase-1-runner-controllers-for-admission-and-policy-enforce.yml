features:
  experiment:
  - name: "Runner controllers for job admission control"
    available_in: [ultimate]
    gitlab_com: false
    self_managed: true
    gitlab_dedicated: false
    gitlab_dedicated_for_government: false
    add_ons: []
    documentation_link: 'https://docs.gitlab.com/ci/runners/job_router/runner_controllers/'
    video: 'https://www.youtube-nocookie.com/embed/tRR7gxN2nyM'
    reporter: gabrielengel_gl
    stage: verify
    categories:
    - 'GitLab Runner Core'
    epic_url: 'https://gitlab.com/groups/gitlab-org/-/epics/19660'
    description: |
      You can now enforce custom policies on CI/CD jobs before runner assignment with runner controllers.
      The runner controller connects to the job router and makes admit or reject decisions based on custom rules.

      Use runner controllers for admission control, compliance enforcement, or cost and resource governance.
      Controllers support instance runners and a dry-run mode for safe validation before enforcement.

      This feature is an [experiment](https://docs.gitlab.com/policy/development_stages_support/).
      To get started, see [Tutorial: Build a runner admission controller](https://docs.gitlab.com/tutorials/build_runner_admission_controller/).
