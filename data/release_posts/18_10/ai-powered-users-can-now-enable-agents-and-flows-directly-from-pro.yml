---
features:
  secondary:
  - name: "Users can enable agents and flows directly from projects"
    available_in: [premium, ultimate]
    gitlab_com: true
    self_managed: true
    gitlab_dedicated: true
    gitlab_dedicated_for_government: true
    add_ons: []
    documentation_link: 'https://docs.gitlab.com/user/duo_agent_platform/agents/custom/#enable-an-agent'
    reporter: amandarueda
    stage: ai-powered
    categories:
    - AI Catalog
    issue_url: 'https://gitlab.com/gitlab-org/gitlab/-/work_items/588012'
    description: |
      Maintainers and Owners can now enable agents and flows directly from their project or the explore page, without navigating away from their current context. 

      Top-level group Owners can also select their group, and the specific projects where they want to activate agents and flows, streamlining their workflow setup.
