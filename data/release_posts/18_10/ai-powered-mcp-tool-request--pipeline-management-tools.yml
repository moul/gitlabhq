---
features:
  secondary:
  - name: "GitLab MCP server tool for pipeline management"
    available_in: [premium, ultimate]
    gitlab_com: true
    self_managed: true
    gitlab_dedicated: true
    gitlab_dedicated_for_government: true
    add_ons: []
    documentation_link: 'https://docs.gitlab.com/user/gitlab_duo/model_context_protocol/mcp_server_tools/#manage_pipeline'
    reporter: amandarueda
    stage: ai-powered
    categories:
    - MCP Server
    issue_url: 'https://gitlab.com/gitlab-org/gitlab/-/work_items/583826'
    description: |
      You can now manage your CI/CD pipelines in a GitLab project with the new `manage_pipeline` tool.
      This GitLab MCP server tool lets AI agents create, cancel, retry, delete, and update pipeline metadata in a single call.
      With this tool, you no longer have to piece together multiple steps to automate your pipeline workflows.

      If you want to see other GitLab MCP server tools, let us know in the [feedback issue](https://gitlab.com/gitlab-org/gitlab/-/work_items/566375).
