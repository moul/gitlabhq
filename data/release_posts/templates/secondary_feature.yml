# Release post data file for Secondary items
#
# Read through the Release Posts Handbook for more information:
# https://handbook.gitlab.com/handbook/marketing/blog/release-posts/#features
#
# DELETE THESE COMMENTS BEFORE SUBMITTING THE MERGE REQUEST
---
features:
  secondary:
  - name: "Do great things with this feature"
    available_in: [core, premium, ultimate]  # Include all supported tiers
    documentation_link: 'https://docs.gitlab.com/#amazing'
    gitlab_com: true # Whether this feature is available on GitLab.com
    self_managed: true # Whether this feature is available on GitLab Self-Managed
    gitlab_dedicated: true # Whether this feature is available on GitLab Dedicated
    gitlab_dedicated_for_government: true # Whether this feature is available on GitLab Dedicated for Government
    add_ons: [] # Each word adds a badge. For example, ["Duo Pro", "Duo Enterprise"] adds two badges.
    image_url: '/images/13_2/feature-a.png'
    reporter: pm1
    stage: plan
    categories:
    - 'Category name goes here. Only one is required. Add/delete other categories as needed.'
    - 'optional second category'
    - 'etc'
    issue_url: # Multiple links are supported. Avoid linking to confidential issues.
    - ''
    description: |
      Use present tense, and speak about "you" instead of "the user."

      Describe how the new functionality is beneficial. Use phrases that start with, "In previous versions of GitLab, you couldn't... Now you can..."

      [Add another link](#link) if needed.
